<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>NSL-KDD 入侵偵測 Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .wrapper {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    h1 {
      font-size: 1.3rem;
      color: #1a202c;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 32px;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    /* Model buttons */
    .model-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 28px;
    }

    .model-btn {
      padding: 10px 6px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 0.82rem;
      color: #4a5568;
      transition: all 0.15s;
      text-align: center;
    }

    .model-btn:hover { border-color: #667eea; color: #667eea; }

    .model-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: white;
      font-weight: 600;
    }

    /* SMOTE toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
    }

    .toggle input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #cbd5e0;
      border-radius: 26px;
      cursor: pointer;
      transition: 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .slider { background: #667eea; }
    input:checked + .slider::before { transform: translateX(22px); }

    .toggle-label { font-size: 0.92rem; color: #4a5568; }
    .toggle-label span { font-weight: 600; color: #667eea; }

    /* Result display */
    .result-box {
      background: #f7fafc;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      gap: 24px;
    }

    .metric {
      flex: 1;
      text-align: center;
    }

    .metric-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 2.4rem;
      font-weight: 700;
      color: #2d3748;
      transition: all 0.3s;
    }

    .metric-value.highlight {
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .metric-bar-bg {
      height: 6px;
      background: #e2e8f0;
      border-radius: 6px;
      margin-top: 10px;
      overflow: hidden;
    }

    .metric-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.4s ease;
    }

    .divider { width: 1px; background: #e2e8f0; }

    .smote-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
      background: #e9d8fd;
      color: #6b46c1;
      vertical-align: middle;
    }

    /* Charts section */
    .chart-card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .chart-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .chart-tab {
      padding: 8px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 99px;
      background: white;
      cursor: pointer;
      font-size: 0.83rem;
      color: #4a5568;
      transition: all 0.15s;
    }

    .chart-tab:hover { border-color: #667eea; color: #667eea; }

    .chart-tab.active {
      border-color: #667eea;
      background: #667eea;
      color: white;
      font-weight: 600;
    }

    .chart-img {
      width: 100%;
      border-radius: 10px;
      display: none;
    }

    .chart-img.visible { display: block; }
  </style>
</head>
<body>

<div class="wrapper">
<div class="card">
  <h1>網路入侵偵測 <span class="smote-badge" id="smote-badge" style="display:none">SMOTE</span></h1>
  <p class="subtitle">NSL-KDD 資料集 · 二元分類（正常 vs 攻擊）</p>

  <div class="section-label">選擇模型</div>
  <div class="model-grid">
    <button class="model-btn active" onclick="select('Decision Tree', this)">Decision Tree</button>
    <button class="model-btn" onclick="select('Random Forest', this)">Random Forest</button>
    <button class="model-btn" onclick="select('SVM', this)">SVM</button>
    <button class="model-btn" onclick="select('KNN', this)">KNN</button>
    <button class="model-btn" onclick="select('MLP', this)">MLP</button>
  </div>

  <div class="section-label">SMOTE 過採樣</div>
  <div class="toggle-row">
    <label class="toggle">
      <input type="checkbox" id="smote-toggle" onchange="update()">
      <span class="slider"></span>
    </label>
    <span class="toggle-label" id="toggle-text">目前：<span>關閉</span></span>
  </div>

  <div class="section-label">結果</div>
  <div class="result-box">
    <div class="metric">
      <div class="metric-label">Accuracy</div>
      <div class="metric-value" id="acc-val">—</div>
      <div class="metric-bar-bg"><div class="metric-bar" id="acc-bar" style="width:0%"></div></div>
    </div>
    <div class="divider"></div>
    <div class="metric">
      <div class="metric-label">F1 Score</div>
      <div class="metric-value" id="f1-val">—</div>
      <div class="metric-bar-bg"><div class="metric-bar" id="f1-bar" style="width:0%"></div></div>
    </div>
  </div>
</div>

<div class="chart-card">
  <div class="section-label" style="margin-bottom:16px">圖表</div>
  <div class="chart-tabs">
    <button class="chart-tab active" onclick="showChart('acc', this)">Accuracy 比較</button>
    <button class="chart-tab" onclick="showChart('f1', this)">F1 比較</button>
    <button class="chart-tab" onclick="showChart('dist', this)">類別分布</button>
  </div>
  <img id="chart-acc"  class="chart-img visible" src="slides/charts/accuracy_comparison.png" alt="Accuracy 比較">
  <img id="chart-f1"   class="chart-img"         src="slides/charts/f1_comparison.png"       alt="F1 比較">
  <img id="chart-dist" class="chart-img"         src="slides/charts/class_distribution.png"  alt="類別分布">
</div>

</div>

<script>
  const RESULTS = {
    'Decision Tree': { no: { acc: 0.7887, f1: 0.7783 }, sm: { acc: 0.7915, f1: 0.7816 } },
    'Random Forest': { no: { acc: 0.7705, f1: 0.7542 }, sm: { acc: 0.7789, f1: 0.7651 } },
    'SVM':           { no: { acc: 0.7513, f1: 0.7373 }, sm: { acc: 0.7548, f1: 0.7424 } },
    'KNN':           { no: { acc: 0.7676, f1: 0.7492 }, sm: { acc: 0.7679, f1: 0.7497 } },
    'MLP':           { no: { acc: 0.7736, f1: 0.7575 }, sm: { acc: 0.7744, f1: 0.7585 } },
  };

  let currentModel = 'Decision Tree';

  function select(model, btn) {
    currentModel = model;
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    update();
  }

  function animate(el) {
    el.classList.remove('highlight');
    void el.offsetWidth;
    el.classList.add('highlight');
  }

  function update() {
    const useSmote = document.getElementById('smote-toggle').checked;
    const key = useSmote ? 'sm' : 'no';
    const r = RESULTS[currentModel][key];

    const accEl = document.getElementById('acc-val');
    const f1El  = document.getElementById('f1-val');
    accEl.textContent = (r.acc * 100).toFixed(1) + '%';
    f1El.textContent  = r.f1.toFixed(4);
    animate(accEl); animate(f1El);

    document.getElementById('acc-bar').style.width = (r.acc * 100) + '%';
    document.getElementById('f1-bar').style.width  = (r.f1  * 100) + '%';

    const badge = document.getElementById('smote-badge');
    badge.style.display = useSmote ? 'inline-block' : 'none';

    const label = document.getElementById('toggle-text');
    label.innerHTML = useSmote
      ? '目前：<span>開啟</span>'
      : '目前：<span style="color:#718096">關閉</span>';
  }

  update();

  function showChart(key, btn) {
    document.querySelectorAll('.chart-img').forEach(img => img.classList.remove('visible'));
    document.querySelectorAll('.chart-tab').forEach(b   => b.classList.remove('active'));
    document.getElementById('chart-' + key).classList.add('visible');
    btn.classList.add('active');
  }
</script>
</body>
</html>
